<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>OXP / Terraf Shell — Documentation</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <meta name="description" content="OXP / Terraf Shell — full-stack platform documentation">
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <style>
    :root {
      --theme-color: #1a56db;
    }
    .app-name-link img { height: 28px; }
    .sidebar-nav > ul > li > a { font-weight: 600; font-size: 0.9em; text-transform: uppercase; letter-spacing: 0.04em; }
    .sidebar-nav > ul > li > ul > li > a { font-weight: normal; font-size: 0.95em; }
    nav.app-nav a[href*="en/"]::before  { content: "🇺🇸 "; }
    nav.app-nav a[href*="zh/"]::before  { content: "🇨🇳 "; }
    nav.app-nav a[href*="ko/"]::before  { content: "🇰🇷 "; }
  </style>
</head>
<body>
  <div id="app">Loading...</div>
  <script>
    window.$docsify = {
      name: 'Terraf Shell',
      logo: '',
      repo: '',

      loadSidebar: true,
      loadNavbar: true,
      subMaxLevel: 3,
      auto2top: true,
      relativePath: false,

      search: {
        maxAge: 86400000,
        placeholder: 'Search docs...',
        noData: 'No results found.',
        depth: 3,
        hideOtherSidebarContent: false,
      },

      copyCode: {
        buttonText: 'Copy',
        errorText: 'Error',
        successText: 'Copied!',
      },

      pagination: {
        previousText: 'Previous',
        nextText: 'Next',
        crossChapter: true,
        crossChapterText: true,
      },

      plugins: [
        function(hook, vm) {
          hook.beforeEach(function(content) {
            return content;
          });
        }
      ]
    };
  </script>

  <!-- Docsify core -->
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>

  <!-- Plugins -->
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-copy-code@2/dist/docsify-copy-code.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-pagination/dist/docsify-pagination.min.js"></script>

  <!-- Syntax highlighting -->
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-php.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-nginx.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-sql.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-json.min.js"></script>
</body>
</html>
